<head>

        <style>
    /* 画面いっぱいに表示するための土台 */
    body {
        margin: 0; padding: 0;
        height: 100vh; width: 100vw;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: sans-serif;
        overflow-x: hidden; /* 横方向のスクロールを物理的に禁止 */
    position: relative; /* 基準をしっかりさせる */
    }
    #timer { font-size: 5rem; font-weight: bold; }
    #status { font-size: 1.5rem; margin-bottom: 20px; }
    
    /* サイドバーの基本設定 */
    #sidebar {
       position: fixed;
    top: 0;
    left: -100%; /* これで画面外に隠れる */
    width: 100%; 
    max-width: 100vw; /* 最大幅を画面幅に制限 */
    overflow-x: hidden; /* 中身がはみ出したら隠す */
    padding: 0 10px;    /* 左右に少し隙間を作る */
    height: 100%;
    background: #ffffff;
    z-index: 1000; /* 確実に一番手前に */
    transition: left 0.3s ease;
    padding: 80px 20px 20px 20px;
    box-sizing: border-box;
    overflow-y: auto;
    }
    #sidebar.open { left: 0; }
            
    .record-area {
    width: 100%; 
    margin-top: 30px;
    background: #ffffff;
    box-shadow: none; /* サイドバーの中に入るのでシャドウは不要 */
}
            
    /* 記録リストの表示切り替え */
    .menu-folder { display: none; } /* 初期状態は非表示 */
    #sidebar.open .menu-folder { display: block; } /* サイドバーが開いた時だけ表示 */
            
        /* 左上の3本線メニューボタン */
        #menuBtn {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: #7bc0e3;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 4px 10px rgba(123,192,227,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        #menuBtn:hover { background: #64b2da; transform: scale(1.05); }
        
        .bar {
            width: 22px;
            height: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 2px;
        }
     /* メニューボタンが開いた時のスタイル */
#menuBtn.open .bar1 { 
    transform: rotate(-45deg) translate(-5.5px, 7px); /* 少しだけ外側にずらして隙間を埋める */
}
#menuBtn.open .bar2 { 
    opacity: 0; /* ここで真ん中の線を消す */
}
#menuBtn.open .bar3 { 
    transform: rotate(45deg) translate(-5.5px, -7px); /* 上記と対称にずらす */
}

    
       
    

        /* メニュー内の大見出し */
        .menu-folder {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .menu-folder-header {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #4a5568;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .menu-folder-header:hover {
            background: #edf4f9;
            color: #7bc0e3;
        }
        .menu-folder-header::after {
            content: '▶';
            font-size: 0.8rem;
            color: #a0aec0;
            transition: transform 0.2s;
        }
        .menu-folder.active .menu-folder-header::after {
            transform: rotate(90deg);
            color: #7bc0e3;
        }

        .menu-folder-content {
            display: none;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #edf2f7;
        }
        .menu-folder.active .menu-folder-content { display: block; }

        /* 円形カラーパレット */
        .color-palette {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .color-circle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.15);
        }
        .color-circle:hover { transform: scale(1.1); }
        .color-circle.selected { border-color: #4a5568; transform: scale(1.15); box-shadow: 0 0 6px rgba(0,0,0,0.25); }

        /* 編集用の小さな円形パレット */
        .edit-color-palette {
            display: flex;
            gap: 6px;
            margin-top: 6px;

        }
        .edit-color-circle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.1s;
        }
        .edit-color-circle:hover { transform: scale(1.1); }
        .edit-color-circle.selected { border-color: #4a5568; transform: scale(1.15); }

        .manage-section h4 { margin: 0 0 8px 0; font-size: 0.95rem; color: #64748b; }
        
        .task-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .task-input-row input[type="text"], .task-input-row select {
            padding: 8px 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            background: white;
            box-sizing: border-box;
        }
        .task-input-row select { width: 100%; }
        .task-input-row input[type="text"] { flex: 1; }
        .task-input-row input:focus, .task-input-row select:focus { border-color: #7bc0e3; }

        /* 出現するタスク入力グループのアニメーション設定 */
        #taskInputGroup {
            display: none;
            gap: 8px;
            margin-top: 10px;
            background: #f0f7f4;
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed #57c7a3;
            animation: fadeInSlide 0.25s ease forwards;
        }
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-add-btn {
            background: #7bc0e3; color: white; padding: 8px 16px; 
            border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: bold; margin: 0; box-shadow: none;
            border: none; white-space: nowrap;
        }
        .task-add-btn:hover { background: #64b2da; }
        #addTaskBtn { background: #57c7a3; }
        #addTaskBtn:hover { background: #45b391; }
        
        /* 登録済みラベルリスト */
        .registered-tasks { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .label-manage-item {
            display: flex;
            flex-direction: column;
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7;
        }
        .label-view-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .label-info-side {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .circle-dot {
            width: 14px; height: 14px; border-radius: 50%; display: inline-block; box-shadow: inset 0 0 2px rgba(0,0,0,0.1);
        }
        .label-btn-side {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
        }
        .label-edit-btn { color: #7bc0e3; cursor: pointer; font-weight: bold; }
        .label-edit-btn:hover { color: #64b2da; }
        .task-delete { color: #ef4444; cursor: pointer; font-weight: bold; }
        .task-delete:hover { color: #dc2626; }

        /* ラベル編集インラインフォーム */
        .label-edit-box {
            display: none;
            gap: 6px;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 6px;
        }
        .label-edit-box input {
            padding: 4px 8px;
            font-size: 0.9rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            flex: 1;
        }

        .nested-list { font-size: 0.9rem; color: #4a5568; margin-top: 15px; padding-left: 5px; }
        .nested-item { margin-bottom: 8px; }

        /* 棒グラフのコンテナ */
        .chart-container {
            width: 100%;
    overflow-x: auto;       /* 横スクロールを許可 */
    white-space: nowrap;    /* 中身を折り返さない */
    padding-bottom: 10px;
    box-sizing: border-box;
            
        }
            /* グラフがcanvasの場合はこれが必要です */
canvas {
    display: block;
    max-width: none;
}
            /* フィルター（セレクトボックス）の余白 */
.filter-area {
    margin: 10px 0;
    padding: 0 10px;
}
        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            cursor: pointer;
            height: 100%;
            justify-content: flex-end;
        }
        .chart-bar-stack {
            width: 60%;
            max-width: 35px;
            display: flex;
            flex-direction: column-reverse; 
            border-radius: 5px 5px 0 0;
            overflow: hidden;
            transition: all 0.2s ease;
            min-height: 2px; 
            background: #e2e8f0; 
        }
        .chart-bar-segment {
            width: 100%;
            transition: opacity 0.2s;
        }
        .chart-bar-wrapper:hover .chart-bar-segment, .chart-bar-wrapper.active .chart-bar-segment {
            filter: brightness(0.9); 
        }
        .chart-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 6px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* 詳細表示エリア */
        .history-detail-area {
            margin-top: 15px;
            padding: 10px;
            background: #f8fafc;
            border-radius: 10px;
        }
        .history-detail-area h3 {
            font-size: 1rem;
            color: #4a5568;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .history-list { list-style: none; padding: 0; margin: 0; 
                      width: 100%;
    max-width: 100%;
    word-wrap: break-word; /* 長い単語は折り返す */
    }

        /* 記録アイテムインプレース編集 */
        .edit-inline-box {
            display: flex;
            gap: 4px;
            align-items: center;
            background: #edf4f9;
            padding: 4px;
            border-radius: 8px;
            width: 100%;
            margin-top: 4px;
        }
        .edit-inline-box select {
            padding: 4px;
            font-size: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            outline: none;
            background: white;
            max-width: 100px;
        }
        .edit-save-btn {
            background: #57c7a3; color: white; border: none; padding: 4px 8px;
            font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .edit-cancel-btn {
            background: #94a3b8; color: white; border: none; padding: 4px 8px;
            font-size: 0.8rem; border-radius: 4px; cursor: pointer;
        }

        /* メインタイマーエリア */
        .main-area {
            text-align: center;
            flex: 1;
            max-width: 500px;
            /* 追加・修正箇所 */
    display: flex;
    flex-direction: column;
    justify-content: center; /* 縦方向の中央寄せ */
    align-items: center;     /* 横方向の中央寄せ */
    height: 100vh;           /* 画面全体の高さを確保 */
    padding: 0 20px;
    box-sizing: border-box;
        }
    /* タイトルの余白調整 */
.main-area h1 {
    margin-top: 0;
    margin-bottom: 20px;
}
        h1 { font-size: 2.5rem; color: #7bc0e3; margin-bottom: 10px; letter-spacing: 2px; }
        #status {
            font-size: 1.2rem; font-weight: bold; background: #ffffff;
            padding: 8px 20px; border-radius: 20px; display: inline-block;
            box-shadow: 0 4px 10px rgba(123, 192, 227, 0.15);
        }
        #timer { font-size: 7rem; font-weight: bold; color: #7bc0e3; margin: 15px 0; font-variant-numeric: tabular-nums; }
        button { 
            font-size: 1.2rem; font-weight: bold; padding: 12px 30px; margin: 8px; 
            cursor: pointer; border: none; border-radius: 25px; transition: all 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #startBtn { background: #7bc0e3; color: white; }
        #startBtn:hover:not(:disabled) { background: #64b2da; transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        #startBtn.over-break { background: #57c7a3; color: white; opacity: 1 !important; cursor: pointer !important; }
        #startBtn.over-break:hover { background: #45b391; transform: translateY(-2px) !important; }
        #resetBtn { background: #e1e8ed; color: #657786; }
        #resetBtn:hover { background: #d4dee5; }
        #endBreakBtn { background: #57c7a3; color: white; display: none; }
        #endBreakBtn:hover { background: #45b391; transform: translateY(-2px); }

#bgmBtn { background: #fbb6ce; color: white; }
        #bgmBtn:hover { background: #f687b3; transform: translateY(-2px); }
        #bgmBtn.playing { background: #ed64a6; } /* 再生中の少し濃い色 */

        #choiceArea { margin-top: 20px; display: none; }
        .choice-btn { font-size: 1.1rem; padding: 10px 25px; }
        #breakBtn { background: #57c7a3; color: white; }
        #breakBtn:hover { background: #45b391; }
        #continueBtn { background: #7bc0e3; color: white; }
        #continueBtn:hover { background: #64b2da; }

        /* ★改善：終了時のタスク選択エリア（すりガラス背景モーダルウィンドウ化） */
        #taskSelectArea {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3); /* 暗度マスク */
            backdrop-filter: blur(8px);    /* すりガラス効果 */
            -webkit-backdrop-filter: blur(8px);
            z-index: 200; /* 最前面へ配置 */
            display: none; /* JS側で中央寄せのために flex に切り替える */
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            animation: modalSlideUp 0.3s ease-out;
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #taskSelectArea p { margin: 0 0 20px 0; font-size: 1.2rem; font-weight: bold; color: #4a5568; }
        
        /* モーダル内を縦配列に再設計 */
        .select-layout { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        #taskSelectArea select, #taskSelectArea input[type="text"] { 
            padding: 12px; 
            font-size: 1rem; 
            border: 2px solid #e1e8ed; 
            border-radius: 10px; 
            outline: none; 
            background: white; 
            box-sizing: border-box;
            width: 100%;
        }
        #taskSelectArea select:focus, #taskSelectArea input[type="text"]:focus { border-color: #7bc0e3; }
        #saveRecordBtn { 
            background: #7bc0e3; color: white; font-size: 1.1rem; padding: 12px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0 0 0; border: none; 
            width: 100%;
            box-shadow: 0 4px 6px rgba(123,192,227,0.2);
        }
        #saveRecordBtn:hover { background: #64b2da; transform: translateY(-1px); }

        /* 今日の記録エリア（右側） */
        .record-area {
      
            
            width: 320px; background: #ffffff; border-radius: 20px; padding: 20px;
            box-shadow: 0 4px 15px rgba(123, 192, 227, 0.15); text-align: left;
            display: flex; flex-direction: column;
        }
        .record-area h2 {
            font-size: 1.3rem; color: #7bc0e3; margin-top: 0; margin-bottom: 15px;
            border-bottom: 2px solid #f4f9fc; padding-bottom: 8px;
        }
        #recordList { list-style: none; padding: 0; margin: 0; max-height: 280px; overflow-y: auto; }
        .record-item { padding: 8px 10px; border-bottom: 1px solid #f4f9fc; font-size: 0.95rem; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
        .record-item-row { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .record-title-text { flex: 1; margin-right: 6px; word-break: break-all; }
        .record-item span.time-span { font-weight: bold; color: #57c7a3; white-space: nowrap; margin-right: 8px; }
        .edit-trigger-btn { color: #7bc0e3; cursor: pointer; font-size: 0.9rem; user-select: none; }
        .edit-trigger-btn:hover { color: #64b2da; }

        /* ⬇️ ここから追加：削除ボタンのスタイル */
        .delete-trigger-btn { color: #ef4444; cursor: pointer; font-size: 0.9rem; user-select: none; margin-left: 12px; }
        .delete-trigger-btn:hover { color: #dc2626; }
        .action-btn-group { display: flex; align-items: center; }
        /* ⬆️ ここまで追加 */

        .total-area { margin-top: 15px; padding-top: 15px; border-top: 2px dashed #e1e8ed; font-size: 1.05rem; font-weight: bold; color: #4a5568; display: flex; justify-content: space-between; align-items: center; }
        #totalStudyTime { color: #7bc0e3; font-size: 1.2rem; }
    </style>
</head>

    <div id="menuBtn">
        <div class="bar bar1"></div>
        <div class="bar bar2"></div>
        <div class="bar bar3"></div>

            </div>
        </div>

</div>

                <div class="filter-area">
            <select id="yearSelect"></select>
        </div>
        <div class="chart-container">
            <canvas id="chartContainerMonth" style="min-width: 600px; height: 160px;"></canvas>
        </div>
                <div class="history-detail-area">
                    <h3 id="selectedDayTitleMonth">選択してください</h3>
                    <ul id="historyListMonth" class="history-list"></ul>
                </div>
            </div>
         </div>

        <div class="record-area">
    
            <h2>今日の記録</h2>

                <div class="total-area">
             合計勉強時間 <span id="totalStudyTime">0分00秒</span>
        </div>
            <div style="margin-top: 30px; text-align: center; padding-bottom: 20px;">

         </div>
    </div>
</div>
    

    
    <div class="main-area">
        <h1>ぽゆたいまー</h1>
        <div id="status">最初の集中！</div>
        <div id="timer">01:00</div>
        
        <div id="controlButtons">
            <button id="startBtn">スタート</button>
            <button id="resetBtn">リセット</button>

        let audioCtx = null;

        // 画面タップ時に音のロックを解除する関数
        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            // 一瞬だけ無音を鳴らしてiOSの自動再生ブロックを完全に解除
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.001);
        }

        function playBeep() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            function tone(delay) {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + delay);
                osc.connect(audioCtx.destination); 
                osc.start(audioCtx.currentTime + delay);
                osc.stop(audioCtx.currentTime + delay + 0.08);
            }
            tone(0.0); tone(0.15); tone(0.3); tone(0.6); tone(0.75); tone(0.9);
            tone(1.9); tone(2.05); tone(2.2); tone(2.5); tone(2.65); tone(2.8);
            tone(3.8); tone(3.95); tone(4.1); tone(4.4); tone(4.55); tone(4.7);

            const logs = getGlobalLogs();

                logs[dateKey].forEach(item => {
                    const currentLabel = parseLabelFromTitle(item.title);
                    if (currentLabel === oldLabel) {
                        const taskPart = item.title.replace(/^\[.*?\]/, '');
                        item.title = `[${newLabel}]${taskPart}`;
                        changed = true;
                    }

            }

            const dateStr = getTargetDateStr();

            logs[dateStr].push({ title: title, time: timeString, rawSeconds: rawSec, memo: memo || "" });
            localStorage.setItem('poyu_global_logs', JSON.stringify(logs));

        function showDayDetail(dateStr) {
            const logs = getGlobalLogs();

            selectedDayTitleWeek.innerHTML = `${dateStr.replace(/-/g, '/')}<br><span style="font-size:0.85rem; color:#7bc0e3;">総時間: ${formatSecondsToText(totalSec)}</span>`;

            if (daySets.length === 0) {
                historyListWeek.innerHTML = '<li class="record-item" style="color:#94a3b8;">この日の記録はありません</li>';
                return;
            }
            daySets.forEach((set, index) => {
                const li = createRecordLiElement(set, index, dateStr);
                historyListWeek.appendChild(li);
            });
        }

        function showMonthDetail(monthKey, year, month, totalSec) {
            const logs = getGlobalLogs();
            selectedDayTitleMonth.innerHTML = `${year}/${month.toString().padStart(2, '0')}<br><span style="font-size:0.85rem; color:#7bc0e3;">月間総時間: ${formatSecondsToText(totalSec)}</span>`;
            historyListMonth.innerHTML = '';

            const dayMap = {};
            for (const dateKey in logs) {
                if (dateKey.startsWith(monthKey)) {
                    const dayTotalSec = (logs[dateKey] || []).reduce((sum, item) => sum + item.rawSeconds, 0);
                    if (dayTotalSec > 0) { dayMap[dateKey] = dayTotalSec; }
                }
            }

            const sortedDates = Object.keys(dayMap).sort();
            if (sortedDates.length === 0) {
                historyListMonth.innerHTML = '<li class="record-item" style="color:#94a3b8;">この月の記録はありません</li>';
                return;
            }
            sortedDates.forEach(dateKey => {
                const li = document.createElement('li');
                li.className = 'record-item';
                li.style.flexDirection = 'row';
                li.style.justifyContent = 'space-between';
                li.style.borderLeft = "4px solid #cbd5e1";
                li.innerHTML = `${dateKey.replace(/-/g, '/')} <span class="time-span" style="color:#4a5568;">${formatSecondsToText(dayMap[dateKey])}</span>`;
                historyListMonth.appendChild(li);
            });
        }

            // ★追加：アプリが落ちても状態を維持するための保存処理（1秒ごとに呼ぶ）
        function saveTimerState() {
            const state = {
                mode: mode,
                timeLeft: timeLeft,
                lastTickTime: lastTickTime,
                totalElapsedBeforeContinue: totalElapsedBeforeContinue,
                totalOverTimeSeconds: totalOverTimeSeconds,
                totalWork25Count: totalWork25Count,
                isTimerRunning: (timerId !== null) // タイマーが動いていたか
            };
            localStorage.setItem('poyutimer_current_state', JSON.stringify(state));
        }

        // ★追加：アプリが開いた瞬間に前の状態を完全に復元する処理
        function restoreTimerState() {
            const savedData = localStorage.getItem('poyutimer_current_state');
            if (!savedData) return;

            const state = JSON.parse(savedData);
            
            // データを変数に復元
            mode = state.mode;
            timeLeft = state.timeLeft;
            totalElapsedBeforeContinue = state.totalElapsedBeforeContinue;
            totalOverTimeSeconds = state.totalOverTimeSeconds;
            totalWork25Count = state.totalWork25Count;
            
            // 画面の見た目を現在のモードに合わせる
            if (mode === 'work25') {
                document.body.className = 'work-mode';
                choiceArea.style.display = 'none';
            } else if (mode === 'break') {
                document.body.className = 'break-mode';
                choiceArea.style.display = 'none';
            } else if (mode === 'first' || mode === 'choosing') {
                document.body.className = 'over-mode';
                choiceArea.style.display = 'block';
                if (mode === 'first') continueBtn.style.display = 'none';
                if (mode === 'choosing') continueBtn.style.display = 'inline-block';
            }

            // もし裏でタイマーが動いていたなら、自動で再開させて「追いつき処理」を走らせる
            if (state.isTimerRunning && state.lastTickTime) {
                lastTickTime = state.lastTickTime; 
                startTimer(); 
            } else {
                updateDisplay();
            }
        }

        // ★追加：手動リセット時やタイマー完了時に保存データをクリアする用
        function clearTimerState() {
            localStorage.removeItem('poyutimer_current_state');
        }

            function loadRecords() {
            checkAndResetDailyRecords();
            const currentTargetDate = getTargetDateStr();
            const logs = getGlobalLogs();
            const todaySets = logs[currentTargetDate] || [];
            
            recordList.innerHTML = '';
            todaySets.forEach((rec, index) => {
                const li = createRecordLiElement(rec, index, currentTargetDate);
                recordList.appendChild(li);
            });

            const todayTotal = todaySets.reduce((sum, item) => sum + item.rawSeconds, 0);
            totalStudyTimeDisplay.textContent = formatSecondsToText(todayTotal);
            
            // 新しいChart.jsのグラフ関数を呼び出す（要素が存在するときだけ）
            const wp = document.getElementById('weekPicker');
            const ys = document.getElementById('yearSelect');
            if (wp && wp.value) renderWeekChart(wp.value);
            if (ys && ys.value) renderMonthChart(ys.value);
        }

        function updateDisplay() {
            if (mode === 'work25' && timeLeft < 0) {
                const overTime = Math.abs(timeLeft); 
                if (overTime <= 5) { timerDisplay.textContent = "25:00"; } 
                else {
                    const totalSeconds = (25 * 60) + overTime; 
                    const minutes = Math.floor(totalSeconds / 60); const seconds = totalSeconds % 60;
                    timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            } else {
                const minutes = Math.floor(timeLeft / 60); const seconds = timeLeft % 60;
                timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
        }
function startTimer() {
            if (!lastTickTime) {
                lastTickTime = Date.now();
            }            
            timerId = setInterval(() => {
                const now = Date.now();
                // 前回チェックした時から、何秒経過したかを計算（バックグラウンド対策）
                const deltaSec = Math.floor((now - lastTickTime) / 1000);
                
                if (deltaSec > 0) {
                    lastTickTime += deltaSec * 1000; // 経過した分だけ基準時刻を進める
                    
                    // 裏に隠れていた秒数分だけ、タイマー処理を超高速で回して現在に追いつかせる
                    for (let i = 0; i < deltaSec; i++) {
                        if (mode === 'first' || mode === 'choosing') { totalElapsedBeforeContinue++; }
                        if (mode === 'work25' && timeLeft < 0) { totalOverTimeSeconds++; }
                      
                        timeLeft--;

                        if (mode === 'work25') {
                            if (timeLeft === 0) {
                                playBeep();
                                statusDisplay.textContent = "集中終了！オーバータイム突入";
                                timerDisplay.style.color = "#ff8e75"; 
                                totalWork25Count++; 
                                
                                choiceArea.style.display = 'block';
                                continueBtn.style.display = 'none'; // ★オーバータイム時は「継続」ボタンを隠す

                                startBtn.disabled = true; 
                                startBtn.textContent = 'カウント中';
                            }
                        } else {
                            if (mode === 'first' && timeLeft <= 0) {
                                mode = 'choosing';
                                timeLeft = TIME_CHOOSING; 
                                statusDisplay.textContent = "どっちにする？ (自動継続まであと少し)";
                                timerDisplay.style.color = "#ef4444"; 
                                choiceArea.style.display = 'block'; 
                                continueBtn.style.display = 'inline-block'; // ★最初の1分終了時は「継続」ボタンを出す
                            } 
                           else if (mode === 'choosing' && timeLeft <= 0) { clearTimerState(); goToContinue(); return; }
                            else if (mode === 'break' && timeLeft <= 0) { clearTimerState(); playBeep(); goToFirstModeAutoStart(); return; }
                        }
                    }
                    saveTimerState();
                    updateDisplay(); // 追いついた結果をまとめて画面に反映
                }
            }, 500); // 0.5秒間隔で高速監視し、画面を開いた瞬間の数字のズレをなくします

            if (mode !== 'choosing') { startBtn.textContent = 'カウント中'; startBtn.disabled = true; }
            saveTimerState();
        }


        // ★バグ修正：リセット時にタイマーを完全に初期化して最初の集中（1分）に戻す
        function stopAndBackToFirst() {
            if (timerId !== null) {
                clearInterval(timerId); 
                timerId = null;
                lastTickTime = null; // ★これを追加！
                saveTimerState();
            }
            mode = 'first'; 
            timeLeft = TIME_FIRST; // 1分にリセット
            statusDisplay.textContent = "最初の集中！";
            timerDisplay.style.color = "#7bc0e3"; 
            choiceArea.style.display = 'none'; 
            endBreakBtn.style.display = 'none'; 
            taskSelectArea.style.display = 'none'; 
            startBtn.classList.remove('over-break'); 
            startBtn.disabled = false; 
            startBtn.textContent = 'スタート';
            totalElapsedBeforeContinue = 0; 
            totalOverTimeSeconds = 0; 
            totalWork25Count = 0; 
            hasContinuedInCurrentLoop = false; 
            updateDisplay(); // 画面表示を「01:00」に更新
        }

       function goToContinue() {
            if (mode === 'work25') return; // ★追加：ダブルタップ防止
            mode = 'work25';
            timeLeft = TIME_WORK25; 
            statusDisplay.textContent = "作業中！(25分集中)";
            timerDisplay.style.color = "#7bc0e3"; 
            choiceArea.style.display = 'none'; 
            endBreakBtn.style.display = 'none'; 
            hasContinuedInCurrentLoop = true; 
            startBtn.classList.remove('over-break');
            startBtn.textContent = 'カウント中'; 
            startBtn.disabled = true;
            updateDisplay();
        }

        function goToBreak() {
            if (mode === 'break') return; // ★追加：すでに休憩モードに入っている場合は、連続タップを無視する（ダブルタップ防止）

            // 「どの画面から休憩ボタンを押したか」で休憩時間を決める
            if (mode === 'choosing' || mode === 'first') {
                // 最初の1分（どっちにする？の選択中）から休憩を押した場合
                timeLeft = TIME_SHORT_BREAK; // 1分
                statusDisplay.textContent = "休憩中！(1分)";
            } else {
                // 25分集中（オーバータイム中）から休憩を押した場合
                timeLeft = TIME_BREAK; // 5分
                statusDisplay.textContent = "休憩中！(5分)";
            }
            
            mode = 'break'; // 判定が終わってから、タイマーを休憩モードに切り替える
            
            timerDisplay.style.color = "#57c7a3"; 
            choiceArea.style.display = 'none';
            if (totalWork25Count > 0) { endBreakBtn.style.display = 'inline-block'; }
            startBtn.classList.remove('over-break'); 
            startBtn.textContent = 'カウント中'; 
            startBtn.disabled = true;
            updateDisplay();
        }

            // ★追加：休憩終了時に自動で次のセットを開始する処理
        function goToFirstModeAutoStart() {
            mode = 'first'; 
            timeLeft = TIME_FIRST; 
            statusDisplay.textContent = "最初の集中！";
            timerDisplay.style.color = "#7bc0e3"; 
            choiceArea.style.display = 'none'; 
            endBreakBtn.style.display = 'none'; 
            taskSelectArea.style.display = 'none'; 
            startBtn.classList.remove('over-break'); 
            startBtn.disabled = true; // 自動でカウント中になるため押せないようにする
            startBtn.textContent = 'カウント中';
            totalElapsedBeforeContinue = 0; 
            totalOverTimeSeconds = 0; 
            hasContinuedInCurrentLoop = false; 
            
            // すでに裏でタイマーは動いているので、表示を更新して状態を保存するだけ
            updateDisplay();
            saveTimerState();
        }
           
        startBtn.addEventListener('click', () => {
            unlockAudio(); // ★追加: ボタンを押した瞬間に音のロックを解除
            if (startBtn.classList.contains('over-break')) { goToBreak(); } else { if (timerId === null) { startTimer(); } }
        });
       
        resetBtn.addEventListener('click', () => {
            stopAndBackToFirst();
            clearTimerState(); // ★ここに追加！手動リセット時に一時保存データをきれいに消します
        });

        endBreakBtn.addEventListener('click', () => {
            if (timerId !== null) {
                clearInterval(timerId);
                timerId = null;
                lastTickTime = null; // ★これを追加！
            }
            setupFinishDropdowns(); 
            taskSelectArea.style.display = 'flex'; 
            endBreakBtn.style.display = 'none';
        });

        saveRecordBtn.addEventListener('click', () => {
            playBeep(); 
            checkAndResetDailyRecords();

            const totalSeconds = totalElapsedBeforeContinue + (totalWork25Count * TIME_WORK25) + totalOverTimeSeconds;
            const timeString = formatSecondsToText(totalSeconds);
            
            const selectedLabel = finishLabelDropdown.value;
            let selectedTask = finishTaskDropdown.value;
            if (selectedTask === "なし") { selectedTask = ""; }

            const displayTitle = selectedTask ? `[${selectedLabel}] ${selectedTask}` : `[${selectedLabel}]`;
            
            const memoValue = finishMemoInput.value.trim();
            const savedLabel = finishLabelDropdown.value;

            saveToGlobalLogs(displayTitle, timeString, totalSeconds, memoValue);
            loadRecords();

            stopAndBackToFirst(); 

            finishLabelDropdown.value = savedLabel;
            finishLabelDropdown.dispatchEvent(new Event('change'));
            
            finishMemoInput.value = ""; 
        });

        breakBtn.addEventListener('click', goToBreak);
        continueBtn.addEventListener('click', goToContinue);

// ⬇️ ここから追加：BGM再生機能のプログラム
        const bgmBtn = document.getElementById('bgmBtn');
        const bgmAudio = document.getElementById('bgmAudio');
        let isBgmPlaying = false;

        bgmBtn.addEventListener('click', () => {
            if (isBgmPlaying) {
                // 鳴っている場合は止める
                bgmAudio.pause();
                isBgmPlaying = false;
                bgmBtn.textContent = '🎵 BGM 再生';
                bgmBtn.classList.remove('playing');
            } else {
                // 止まっている場合は再生する
                bgmAudio.play().then(() => {
                    isBgmPlaying = true;
                    bgmBtn.textContent = '⏸ BGM 停止';
                    bgmBtn.classList.add('playing');
                }).catch(err => {
                    // もしファイルが見つからないなどのエラーが起きた場合の安全装置
                    alert('エラー：音声ファイルが読み込めませんでした。MP3の指定場所（URL）を確認してください！');
                });
            }
        });
        
        clearAllDataBtn.addEventListener('click', () => {
            if (!confirm("本当にすべてのデータを削除しますか？\n登録したラベルやタスク名、これまでの勉強記録ログがすべて消去され、元に戻せなくなります。")) return;
            if (!confirm("【最終確認】本当に初期化してよろしいですか？（蓄積されたデータがすべてまっさらになります）")) return;

            localStorage.removeItem('poyu_category_data');
            localStorage.removeItem('poyu_global_logs');
            localStorage.removeItem('poyu_timer_date');

            alert("すべてのデータをリセットしました。アプリを再読み込みします。");
            location.reload(); 
        });

        // 画面の初期化
        statusDisplay.textContent = "最初の集中！";
        renderCategorySettings();
        loadRecords();
        updateDisplay();

      // 1. グラフ管理用変数
let myWeekChart = null;
let myMonthChart = null;

// 2. 週の日付範囲を計算する関数
function getWeekRangeLabel(weekStr) {
    if (!weekStr) return "";
    const parts = weekStr.split('-W');
    if (parts.length !== 2) return "";
    const year = parseInt(parts[0], 10);
    const week = parseInt(parts[1], 10);

    // ISO 8601規格（週選択の基準）に基づいた正確な週初めの計算
    // 「その年の1月4日」は必ず第1週（W01）に含まれるという規則を使用します
    const jan4 = new Date(year, 0, 4);
    const dayOfWeek = jan4.getDay(); // 0:日, 1:月, ..., 6:土
    const diffToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const firstMonday = new Date(year, 0, 4 - diffToMonday);

    // 該当する週の月曜日と日曜日を計算
    const targetMonday = new Date(firstMonday.getTime() + (week - 1) * 7 * 24 * 60 * 60 * 1000);
    const targetSunday = new Date(targetMonday.getTime() + 6 * 24 * 60 * 60 * 1000);

    const startM = targetMonday.getMonth() + 1;
    const startD = targetMonday.getDate();
    const endM = targetSunday.getMonth() + 1;
    const endD = targetSunday.getDate();

    return `${startM}/${startD}～${endM}/${endD}`;
}
// 3. 週間グラフを描画する関数
function renderWeekChart(weekValue) {
    if (myWeekChart) myWeekChart.destroy();
    
    // '[]' を '{}' に変更し、辞書型として正しく読み込む
    const logs = JSON.parse(localStorage.getItem('poyu_global_logs') || '{}');
    const [year, weekNum] = weekValue.split('-W');
    
    const monday = new Date(year, 0, (weekNum - 1) * 7 + 1);
    monday.setDate(monday.getDate() - monday.getDay() + 1);
    
    const weekData = new Array(7).fill(0);

    // Object.keysを使って日付ごとに正しくループ処理する
    Object.keys(logs).forEach(dateStr => {
        const logDate = new Date(dateStr); 
        const diffDays = Math.floor((logDate - monday) / (1000 * 60 * 60 * 24));
        if (diffDays >= 0 && diffDays < 7) {
            // その日のタスク（配列）から rawSeconds を合計して分に変換
            const dayTotalSec = logs[dateStr].reduce((sum, item) => sum + (item.rawSeconds || 0), 0);
            weekData[diffDays] += dayTotalSec / 60;
        }
    });
    
    const ctx = document.getElementById('chartContainerWeek').getContext('2d');
    myWeekChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['月', '火', '水', '木', '金', '土', '日'],
            datasets: [{
                label: '勉強時間(分)',
                data: weekData,
                backgroundColor: '#7bc0e3'
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}

// 4. 月間グラフを描画する関数
function renderMonthChart(yearValue) {
    if (myMonthChart) myMonthChart.destroy();
    
    // ここも '{}' に修正
    const logs = JSON.parse(localStorage.getItem('poyu_global_logs') || '{}');
    const monthData = new Array(12).fill(0);
    
    // Object.keysを使って日付ごとに正しくループ処理する
    Object.keys(logs).forEach(dateStr => {
        const logDate = new Date(dateStr);
        if (logDate.getFullYear() == yearValue) {
            const dayTotalSec = logs[dateStr].reduce((sum, item) => sum + (item.rawSeconds || 0), 0);
            monthData[logDate.getMonth()] += dayTotalSec / 60;
        }
    });

    const ctx = document.getElementById('chartContainerMonth').getContext('2d');
    myMonthChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
            datasets: [{
                label: '勉強時間(分)',
                data: monthData,
                backgroundColor: '#7bc0e3'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// 5 & 6. ページ読み込み時の初期化とイベントリスナー（安全に実行するために統合）
window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    const year = now.getFullYear();

    // 1. 週間選択（weekPicker）のイベントリスナー登録
    const weekPicker = document.getElementById('weekPicker');
    if (weekPicker) {
        weekPicker.addEventListener('change', (e) => {
            const titleWeek = document.getElementById('selectedDayTitleWeek');
            if (titleWeek) titleWeek.textContent = getWeekRangeLabel(e.target.value);
            renderWeekChart(e.target.value);
        });
    } else {
        console.warn("HTML内に id='weekPicker' が見つからないため、週間イベントをスキップしました。");
    }

    // 2. 月間選択（yearSelect）のイベントリスナー登録
    const yearSelect = document.getElementById('yearSelect');
    if (yearSelect) {
        yearSelect.addEventListener('change', (e) => {
            renderMonthChart(e.target.value);
        });
        
        // 西暦の選択肢を自動生成する処理（すでに選択肢がある場合はスキップ）
        if (yearSelect.options.length === 0) {
            for (let i = year - 2; i <= year + 1; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.textContent = i + "年";
                if (i === year) opt.selected = true;
                yearSelect.appendChild(opt);
            }
        }
    } else {
        console.warn("HTML内に id='yearSelect' が見つからないため、月間イベントをスキップしました。");
    }

    // 3. 初期値の計算と初回グラフ描画
    const firstDayOfYear = new Date(year, 0, 1);
    const pastDaysOfYear = (now - firstDayOfYear) / 86400000;
    const weekNum = Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
    const weekValue = `${year}-W${weekNum.toString().padStart(2, '0')}`;
    
    // 要素が存在する場合のみ初期値をセット
    if (weekPicker) weekPicker.value = weekValue;
    if (yearSelect) yearSelect.value = year;
    
    const titleWeek = document.getElementById('selectedDayTitleWeek');
    if (titleWeek) titleWeek.textContent = getWeekRangeLabel(weekValue);
    
    // 画面全体の初期化を実行
    statusDisplay.textContent = "最初の集中！";
    renderCategorySettings();
    loadRecords(); // この中で renderWeekChart と renderMonthChart も自動で走ります
    updateDisplay();
    // 一番最後にこれを入れて、アプリ起動時に自動復元を試みる
    restoreTimerState();
});
        
    </script>
