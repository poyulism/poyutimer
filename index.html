        /* 左上の3本線メニューボタン */

        }
     /* メニューボタンが開いた時のスタイル */

}

        }
        .task-add-btn:hover { background: #64b2da; }

        /* 棒グラフのコンテナ */
        .chart-container {
            width: 100%;
    overflow-x: auto;       /* 横スクロールを許可 */

    padding-bottom: 10px;
    box-sizing: border-box;
            
        }
            /* グラフがcanvasの場合はこれが必要です */
canvas {
    display: block;
    max-width: none;
}
            /* フィルター（セレクトボックス）の余白 */
.filter-area {
    margin: 10px 0;

}

        }

        /* 詳細表示エリア */
        .history-detail-area {
            margin-top: 15px;
            padding: 10px;

            border-radius: 10px;
        }

            color: #4a5568;
            margin: 0 0 10px 0;

        }
        .history-list { list-style: none; padding: 0; margin: 0; 
                      width: 100%;
    max-width: 100%;
    word-wrap: break-word; /* 長い単語は折り返す */
    }

        /* 記録アイテムインプレース編集 */
        .edit-inline-box {
            display: flex;
            gap: 4px;
            align-items: center;
            background: #edf4f9;

        }
        .edit-inline-box select {

        }
        .edit-save-btn {

        }

            font-size: 0.8rem; border-radius: 4px; cursor: pointer;
        }

        /* メインタイマーエリア */
        .main-area {
            text-align: center;
            flex: 1;
            max-width: 500px;
            /* 追加・修正箇所 */
    display: flex;
    flex-direction: column;
    justify-content: center; /* 縦方向の中央寄せ */
    align-items: center;     /* 横方向の中央寄せ */
    height: 100vh;           /* 画面全体の高さを確保 */
    padding: 0 20px;
    box-sizing: border-box;
        }
    /* タイトルの余白調整 */
.main-area h1 {
    margin-top: 0;
    margin-bottom: 20px;
}
        h1 { font-size: 2.5rem; color: #7bc0e3; margin-bottom: 10px; letter-spacing: 2px; }
        #status {
            font-size: 1.2rem; font-weight: bold; background: #ffffff;
            padding: 8px 20px; border-radius: 20px; display: inline-block;
            box-shadow: 0 4px 10px rgba(123, 192, 227, 0.15);
        }
        #timer { font-size: 7rem; font-weight: bold; color: #7bc0e3; margin: 15px 0; font-variant-numeric: tabular-nums; }
        button { 
            font-size: 1.2rem; font-weight: bold; padding: 12px 30px; margin: 8px; 
            cursor: pointer; border: none; border-radius: 25px; transition: all 0.2s;

        }
        #startBtn { background: #7bc0e3; color: white; }

        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        #startBtn.over-break { background: #57c7a3; color: white; opacity: 1 !important; cursor: pointer !important; }
        #startBtn.over-break:hover { background: #45b391; transform: translateY(-2px) !important; }
        #resetBtn { background: #e1e8ed; color: #657786; }

        #endBreakBtn { background: #57c7a3; color: white; display: none; }
        #endBreakBtn:hover { background: #45b391; transform: translateY(-2px); }

        #choiceArea { margin-top: 20px; display: none; }
        .choice-btn { font-size: 1.1rem; padding: 10px 25px; }
        #breakBtn { background: #57c7a3; color: white; }
        #breakBtn:hover { background: #45b391; }
        #continueBtn { background: #7bc0e3; color: white; }
        #continueBtn:hover { background: #64b2da; }

        /* ★改善：終了時のタスク選択エリア（すりガラス背景モーダルウィンドウ化） */
        #taskSelectArea {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3); /* 暗度マスク */
            backdrop-filter: blur(8px);    /* すりガラス効果 */
            -webkit-backdrop-filter: blur(8px);
            z-index: 200; /* 最前面へ配置 */
            display: none; /* JS側で中央寄せのために flex に切り替える */
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;

        #taskSelectArea p { margin: 0 0 20px 0; font-size: 1.2rem; font-weight: bold; color: #4a5568; }
        
        /* モーダル内を縦配列に再設計 */
        .select-layout { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        #taskSelectArea select, #taskSelectArea input[type="text"] { 
            padding: 12px;

        }
        #taskSelectArea select:focus, #taskSelectArea input[type="text"]:focus { border-color: #7bc0e3; }
        #saveRecordBtn { 
            background: #7bc0e3; color: white; font-size: 1.1rem; padding: 12px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0 0 0; border: none; 
            width: 100%;
            box-shadow: 0 4px 6px rgba(123,192,227,0.2);
        }
        #saveRecordBtn:hover { background: #64b2da; transform: translateY(-1px); }

        /* 今日の記録エリア（右側） */
        .record-area {
      
            
            width: 320px; background: #ffffff; border-radius: 20px; padding: 20px;

         </div>

</div>

  <script>
        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            function tone(delay) {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime + delay);
                osc.connect(audioCtx.destination); osc.start(audioCtx.currentTime + delay);
                osc.stop(audioCtx.currentTime + delay + 0.08);
            }
            tone(0.0); tone(0.15); tone(0.3); tone(0.6); tone(0.75); tone(0.9);
            tone(1.9); tone(2.05); tone(2.2); tone(2.5); tone(2.65); tone(2.8);
            tone(3.8); tone(3.95); tone(4.1); tone(4.4); tone(4.55); tone(4.7);
        }

        // ★本番用の時間設定（すべて秒数に換算）

        const chartContainerWeek = document.getElementById('chartContainerWeek');

        const chartContainerMonth = document.getElementById('chartContainerMonth');
        const selectedDayTitleMonth = document.getElementById('selectedDayTitleMonth');
        const historyListMonth = document.getElementById('historyListMonth');
        const labelInput = document.getElementById('labelInput');
        const labelColorPalette = document.getElementById('labelColorPalette');
        const addLabelBtn = document.getElementById('addLabelBtn');

        const nestedStructure = document.getElementById('nestedStructure');

        const finishLabelDropdown = document.getElementById('finishLabelDropdown');
        const finishTaskDropdown = document.getElementById('finishTaskDropdown');
        const finishMemoInput = document.getElementById('finishMemoInput');
        const saveRecordBtn = document.getElementById('saveRecordBtn');

        const COLORS = [
            { hex: "#FF6B6B", name: "レッド" },
            { hex: "#FF9F43", name: "オレンジ" },
            { hex: "#FFD93D", name: "イエロー" },
            { hex: "#6BCB77", name: "グリーン" },
            { hex: "#4D96FF", name: "ブルー" },
            { hex: "#9B5DE5", name: "パープル" },
            { hex: "#F15BB5", name: "ピンク" },
            { hex: "#00F5D4", name: "ミント" },
            { hex: "#5DADE2", name: "スカイブルー" },
            { hex: "#AAB7B8", name: "グレー" }
        ];
        let selectedColorHex = COLORS[0].hex;

        function initColorPalette() {
            labelColorPalette.innerHTML = '';
            COLORS.forEach((c, idx) => {
                const circle = document.createElement('div');
                circle.className = 'color-circle';
                circle.style.backgroundColor = c.hex;
                circle.title = c.name;
                if (idx === 0) circle.classList.add('selected');
                circle.addEventListener('click', () => {
                    labelColorPalette.querySelectorAll('.color-circle').forEach(el => el.classList.remove('selected'));
                    circle.classList.add('selected');
                    selectedColorHex = c.hex;
                });
                labelColorPalette.appendChild(circle);
            });
        }
        initColorPalette();

        function getTargetDateObject() {
            const now = new Date();
            return new Date(now.getTime() - (5 * 60 * 60 * 1000));
        }
        function getTargetDateStr() {
            const d = getTargetDateObject();
            return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
        }
        function formatSecondsToText(totalSec) {
            const mins = Math.floor(totalSec / 60);
            const secs = totalSec % 60;
            return `${mins}分${secs.toString().padStart(2, '0')}秒`;
        }

        document.querySelectorAll('.menu-folder-header').forEach(header => {
            header.addEventListener('click', () => {
                header.parentElement.classList.toggle('active');
            });
        });

        function getCategoryData() {
            const data = localStorage.getItem('poyu_category_data');
            const defaultData = { labels: ["その他"], mapping: { "その他": ["なし"] }, colors: { "中心": "#AAB7B8" } };
            if (!data) return defaultData;
            const parsed = JSON.parse(data);
            if (!parsed.colors) { parsed.colors = {}; }
            return parsed;
        }

        function saveCategoryData(data) {
            localStorage.setItem('poyu_category_data', JSON.stringify(data));
            renderCategorySettings();
            
            // 古い日付ピッカーの自動初期化処理は削除し、DOMContentLoaded側に一本化
            loadRecords();
        }

        function parseLabelFromTitle(title) {
            const match = title.match(/^\[(.*?)\]/);
            return match ? match[1] : "その他";
        }
        function getLabelColor(labelName) {
            const data = getCategoryData();
            return data.colors[labelName] || "#AAB7B8";
        }

        addLabelBtn.addEventListener('click', () => {
            const labelName = labelInput.value.trim();
            if (!labelName || labelName === "その他") return;
            const data = getCategoryData();
            if (!data.labels.includes(labelName)) {
                data.labels.push(labelName);
                data.mapping[labelName] = ["なし"];
                data.colors[labelName] = selectedColorHex;
                saveCategoryData(data);
            }
            labelInput.value = '';
        });

        labelSelectRow.addEventListener('change', () => {
            if (labelSelectRow.value !== "") {
                taskInputGroup.style.display = 'flex';
                taskInput.focus();
            } else {
                taskInputGroup.style.display = 'none';
            }
        });

        addTaskBtn.addEventListener('click', () => {
            const selectedLabel = labelSelectRow.value;
            const taskName = taskInput.value.trim();
            if (!selectedLabel || !taskName) return;
            const data = getCategoryData();
            if (!data.mapping[selectedLabel]) {
                data.mapping[selectedLabel] = [];
            }
            if (data.mapping[selectedLabel].includes("なし")) {
                data.mapping[selectedLabel] = data.mapping[selectedLabel].filter(t => t !== "なし");
            }
            if (!data.mapping[selectedLabel].includes(taskName)) {
                data.mapping[selectedLabel].push(taskName);
                saveCategoryData(data);
            }
            taskInput.value = '';
            taskInput.focus();
        });

        function renderCategorySettings() {
            const data = getCategoryData();
            registeredLabels.innerHTML = '';
            labelSelectRow.innerHTML = '';
            const placeholderOpt = document.createElement('option');
            placeholderOpt.value = ""; placeholderOpt.textContent = "-- ラベルを選択してください --";
            labelSelectRow.appendChild(placeholderOpt);

            data.labels.forEach(lbl => {
                // セレクトボックスの更新
                const opt = document.createElement('option');
                opt.value = lbl; opt.textContent = lbl;
                labelSelectRow.appendChild(opt);
            });
            // タスクリストの描画など、他に必要なUI処理があればここに続きます
        }

        }

        // ==========================================
        // グラフ機能セクション
        // ==========================================

        // 1. グラフ管理用変数
        let myWeekChart = null;
        let myMonthChart = null;

        // 2. 週の日付範囲を計算する関数
        function getWeekRangeLabel(weekValue) {
            const [year, week] = weekValue.split('-W');
            const firstDayOfYear = new Date(year, 0, 1);
            const firstMonday = new Date(firstDayOfYear);
            const day = firstDayOfYear.getDay();
            const diff = (day <= 1) ? (1 - day) : (8 - day);
            firstMonday.setDate(firstDayOfYear.getDate() + diff);

            const monday = new Date(firstMonday);
            monday.setDate(firstMonday.getDate() + (week - 1) * 7);
            
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            
            return `${monday.getMonth() + 1}/${monday.getDate()} ~ ${sunday.getMonth() + 1}/${sunday.getDate()}`;
        }

        // 3. 週間グラフを描画する関数
        function renderWeekChart(weekValue) {
            if (myWeekChart) myWeekChart.destroy();
            
            const logs = JSON.parse(localStorage.getItem('poyu_global_logs') || '[]');
            const [year, weekNum] = weekValue.split('-W');
            
            const monday = new Date(year, 0, (weekNum - 1) * 7 + 1);
            monday.setDate(monday.getDate() - monday.getDay() + 1);

            const weekData = new Array(7).fill(0);

            logs.forEach(log => {
                const logDate = new Date(log.date); 
                const diffDays = Math.floor((logDate - monday) / (1000 * 60 * 60 * 24));
                if (diffDays >= 0 && diffDays < 7) {
                    weekData[diffDays] += (log.totalSeconds || 0) / 60;
                }
            });
            
            const ctx = document.getElementById('chartContainerWeek').getContext('2d');
            myWeekChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['月', '火', '水', '木', '金', '土', '日'],
                    datasets: [{
                        label: '勉強時間(分)',
                        data: weekData,
                        backgroundColor: '#7bc0e3'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // 4. 月間グラフを描画する関数
        function renderMonthChart(yearValue) {
            if (myMonthChart) myMonthChart.destroy();
            
            const logs = JSON.parse(localStorage.getItem('poyu_global_logs') || '[]');
            const monthData = new Array(12).fill(0);
            
            logs.forEach(log => {
                const logDate = new Date(log.date);
                if (logDate.getFullYear() == yearValue) {
                    monthData[logDate.getMonth()] += (log.totalSeconds || 0) / 60;
                }
            });

            const ctx = document.getElementById('chartContainerMonth').getContext('2d');
            myMonthChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    datasets: [{
                        label: '勉強時間(分)',
                        data: monthData,
                        backgroundColor: '#7bc0e3'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // 5. イベントリスナー
        document.getElementById('weekPicker').addEventListener('change', (e) => {
            document.getElementById('selectedDayTitleWeek').textContent = getWeekRangeLabel(e.target.value);
            renderWeekChart(e.target.value);
        });

        document.getElementById('yearSelect').addEventListener('change', (e) => {
            renderMonthChart(e.target.value);
        });

        // 6. ページ読み込み時の初期化
        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const year = now.getFullYear();

            // 西暦の選択肢を自動生成する処理
            const yearSelect = document.getElementById('yearSelect');
            if (yearSelect && yearSelect.options.length === 0) {
                for (let i = year - 2; i <= year + 1; i++) {
                    let opt = document.createElement('option');
                    opt.value = i; opt.textContent = i + "年";
                    if (i === year) opt.selected = true;
                    yearSelect.appendChild(opt);
                }
            }
            
            // 今日の週番号を計算
            const firstDayOfYear = new Date(year, 0, 1);
            const pastDaysOfYear = (now - firstDayOfYear) / 86400000;
            const weekNum = Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
            
            const weekValue = `${year}-W${weekNum.toString().padStart(2, '0')}`;
            document.getElementById('weekPicker').value = weekValue;
            document.getElementById('yearSelect').value = year;
            
            // タイトルと初期グラフを1発で表示
            document.getElementById('selectedDayTitleWeek').textContent = getWeekRangeLabel(weekValue);
            renderWeekChart(weekValue);
            renderMonthChart(year);
        });
    </script>
